;PlatformIO Project Configuration File for ESP32
;
; This is a basic ESP32 template optimized for rapid development
; Customize for your specific board and requirements

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial Monitor Configuration
monitor_speed = 115200
monitor_filters =
    esp32_exception_decoder
    time

; Build Optimization
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ARDUHAL_LOG_COLORS
    ; Optimize for debugging (change to -O2 for production)
    -Os
    ; Enable more compiler warnings
    -Wall
    -Wextra

; Upload Configuration
upload_speed = 921600

; Dependencies (add as needed)
lib_deps =

; Test Configuration
test_build_src = yes
test_framework = unity

; Static Analysis
check_tool = cppcheck, clangtidy
check_flags =
    cppcheck: --enable=all --suppress=missingIncludeSystem
    clangtidy: --checks=-*,cert-*,clang-analyzer-*,performance-*

; Memory inspection
debug_tool = esp-prog
debug_init_break = tbreak setup

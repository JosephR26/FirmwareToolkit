;PlatformIO Project Configuration File for ESP32 WiFi Project
;
; Template optimized for WiFi-enabled ESP32 applications

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
monitor_filters =
    esp32_exception_decoder
    time

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ARDUHAL_LOG_COLORS
    -Os
    -Wall
    -Wextra
    ; WiFi specific flags
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
    -DCONFIG_ASYNC_TCP_USE_WDT=1

upload_speed = 921600

lib_deps =
    ; WiFi and networking
    AsyncTCP
    ESPAsyncWebServer
    ; Optional: MQTT, HTTP client, etc.
    ; knolleary/PubSubClient@^2.8
    ; bblanchon/ArduinoJson@^6.21.3

test_build_src = yes
test_framework = unity

check_tool = cppcheck, clangtidy
check_flags =
    cppcheck: --enable=all --suppress=missingIncludeSystem
    clangtidy: --checks=-*,cert-*,clang-analyzer-*,performance-*
